      // Syntax Highlighter Engine for C code
      function highlightCCode(code) {
        if (!code) return '';
        let escaped = code
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        const placeholders = [];
        const pattern = /(\/\*[\s\S]*?\*\/)|(\/\/.*)|("(?:\\.|[^"\\])*")|('(?:\\.|[^'\\])*')/g;
        
        escaped = escaped.replace(pattern, (match, blockComment, lineComment, str, char) => {
          const id = `___PLACEHOLDER_${placeholders.length}___`;
          if (blockComment) {
            placeholders.push(`<span class="text-zinc-500 italic font-mono">${blockComment}</span>`);
          } else if (lineComment) {
            placeholders.push(`<span class="text-zinc-500 italic font-mono">${lineComment}</span>`);
          } else if (str) {
            placeholders.push(`<span class="text-amber-200 font-mono">${str}</span>`);
          } else if (char) {
            placeholders.push(`<span class="text-amber-300 font-mono">${char}</span>`);
          }
          return id;
        });

        escaped = escaped.replace(/(^\s*#\s*\w+)(?:\s*&lt;([^&]+)&gt;)?/gm, (match, directive, header) => {
          if (header) {
            return `<span class="text-pink-400 font-semibold">${directive}</span> &lt;<span class="text-emerald-400">${header}</span>&gt;`;
          }
          return `<span class="text-pink-400 font-semibold">${directive}</span>`;
        });

        // To protect already generated HTML tags (like <span class="...">) from being matched,
        // we match and skip any HTML tags: (<[^>]+>)
        
        const keywordsRegex = /(<[^>]+>)|(\b(int|char|float|double|void|struct|typedef|union|enum|if|else|while|for|do|return|switch|case|break|continue|default|sizeof|static|const|volatile|extern|register|goto|unsigned|signed|long|short)\b)/g;
        escaped = escaped.replace(keywordsRegex, (match, tag, keyword) => {
          return tag ? tag : `<span class="text-blue-400 font-semibold">${keyword}</span>`;
        });

        const stdFuncsRegex = /(<[^>]+>)|(\b(printf|scanf|malloc|calloc|realloc|free|exit|fopen|fclose|fprintf|fscanf|fgets|fputs|strlen|strcpy|strcmp|strcat|main|size_t|NULL|node|Node|stack|Stack|queue|Queue|list|List)\b)/g;
        escaped = escaped.replace(stdFuncsRegex, (match, tag, func) => {
          return tag ? tag : `<span class="text-cyan-400">${func}</span>`;
        });

        const numbersRegex = /(<[^>]+>)|(\b(0x[0-9a-fA-F]+|\d+(?:\.\d+)?)\b)/g;
        escaped = escaped.replace(numbersRegex, (match, tag, num) => {
          return tag ? tag : `<span class="text-purple-400">${num}</span>`;
        });

        const funcCallsRegex = /(<[^>]+>)|(\b([a-zA-Z_]\w*)(?=\s*\())/g;
        escaped = escaped.replace(funcCallsRegex, (match, tag, name) => {
          return tag ? tag : `<span class="text-indigo-300">${name}</span>`;
        });

        for (let i = 0; i < placeholders.length; i++) {
          escaped = escaped.replace(`___PLACEHOLDER_${i}___`, placeholders[i]);
        }

        return escaped;
      }

      // Markdown Question Parsing Utility
      function parseQuestions(markdown, weekName) {
        if (!markdown) return [];
        const questions = [];
        const lines = markdown.split('\n');
        let index = 1;

        for (const line of lines) {
          if (line.trim().startsWith('## ')) {
            const text = line.replace(/^\s*##\s*/, '').trim();
            let associatedFile = null;
            const fileRegex = /([a-zA-Z0-9_\-]+\.c)/i;
            const match = text.match(fileRegex);
            if (match) {
              associatedFile = match[1];
            }

            questions.push({
              id: `${weekName.toLowerCase().replace(/\s+/g, '-')}-q-${index++}`,
              text,
              associatedFile,
              weekName,
            });
          }
        }
        return questions;
      }

      };

      // File Tree component
      function FileTree({ weeks, selectedWeek, onSelectWeek, onSelectFile, onSelectQuestion, activeFileName, activeQuestionId, loading }) {
        const [expandedWeeks, setExpandedWeeks] = useState({ 'Week 1': true });
        const [searchQuery, setSearchQuery] = useState('');

        const toggleWeek = (weekName) => {
          setExpandedWeeks(prev => ({ ...prev, [weekName]: !prev[weekName] }));
          onSelectWeek(weekName);
        };

        const filteredWeeks = weeks.map(w => {
          const matches = w.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
            w.questions.some(q => q.text.toLowerCase().includes(searchQuery.toLowerCase())) ||
            w.files.some(f => f.name.toLowerCase().includes(searchQuery.toLowerCase()));
          return matches ? w : null;
        }).filter(Boolean);

        return (

                <span className="text-[11px] uppercase tracking-[0.2em] font-extrabold text-neutral-200 font-mono">EXPLORER</span>
              </div>
              {loading && (
                <span className="text-[9px] bg-emerald-500/25 border border-emerald-400 text-emerald-300 font-bold font-mono px-1.5 py-0.5 rounded animate-pulse">
                  SYNCING
                </span>
              )}
            </div>

            <div className="relative mb-4">
              <div className="flex items-center gap-2 px-3 py-1.5 bg-neutral-900 border border-neutral-700 rounded font-mono text-xs text-neutral-300">
                <span className="text-emerald-400 font-extrabold">$</span>
                <input
                  type="text"
                  placeholder="grep tasks..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full bg-transparent border-none text-white font-semibold focus:outline-none placeholder:text-neutral-500 text-xs"
                />
              </div>
            </div>

            <div className="text-[11px] uppercase tracking-[0.2em] text-neutral-200 mb-3 font-extrabold font-mono pl-1">STRUCTURE</div>

            <div className="flex-1 overflow-y-auto space-y-1.5 pr-1 text-left">
              {filteredWeeks.length === 0 ? (
                <div className="text-center py-8 text-neutral-400 text-xs font-bold font-mono">no results found</div>
              ) : (
                filteredWeeks.map(week => {
                  const isExpanded = !!expandedWeeks[week.name];
                  const isSelected = selectedWeek?.name === week.name;

                  return (
                    <div key={week.name} className="flex flex-col">
                      <button
                        onClick={() => toggleWeek(week.name)}
                        className={`flex items-center justify-between w-full py-1.5 px-2 rounded-sm text-left transition text-xs font-mono group cursor-pointer border-l ${

                            ? 'bg-emerald-500/10 text-emerald-300 border-emerald-400 font-bold'
                            : 'hover:bg-neutral-900/60 text-neutral-300 hover:text-white border-transparent'
                        }`}
                      >
                        <div className="flex items-center space-x-2 truncate">

                          <Icon name={isExpanded ? 'folderOpen' : 'folder'} className="w-3.5 h-3.5 text-emerald-400 shrink-0" />

                        </div>
                        <span className="text-[10px] text-zinc-200 bg-neutral-900 border border-neutral-800 px-1.5 py-0.5 rounded font-bold font-mono">
                          {week.files.length + (week.readmeContent ? 1 : 0)}f
                        </span>
                      </button>

                      {isExpanded && (
                        <div className="ml-3 pl-3 border-l border-neutral-700 mt-1 space-y-2">
                          {week.readmeContent && (
                            <button
                              onClick={() => onSelectFile(week.name, 'README.md')}

                                  ? 'text-amber-300 bg-neutral-900/90 font-extrabold border border-amber-500/30'

                              }`}

      // Code Viewer Component

          if (!code) return;
          try {
            await navigator.clipboard.writeText(code);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          } catch (err) {
            console.error(err);
          }
        };

        const handleDownload = () => {
          if (!code || !fileName) return;
          const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = fileName;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
        };

        const githubFileUrl = fileName && weekName

      // Terminal Console component
      function TerminalConsole({ weeks, currentWeek, onSelectWeek, onSelectFile, onSelectQuestion, repoName, terminalTrigger }) {
        const [input, setInput] = useState('');
        const [isExpanded, setIsExpanded] = useState(false);
        const [history, setHistory] = useState([
          { id: '1', type: 'success', text: 'EEYEL-DSA Code Fetcher Terminal Shell [v1.0.0]' },
          { id: '2', type: 'output', text: `Connected to GitHub Repository: ${repoName}` },
          { id: '3', type: 'output', text: 'Type "help" to see available terminal commands or navigate using the graphical explorer.' },
          { id: '4', type: 'output', text: 'Tip: Click folders and files in the sidebar to automatically execute terminal commands!' },
        ]);
        const [commandHistory, setCommandHistory] = useState([]);
        const [historyIndex, setHistoryIndex] = useState(-1);
        const terminalEndRef = useRef(null);
        const inputRef = useRef(null);
        const lastProcessedTriggerRef = useRef(null);

        useEffect(() => {
          terminalEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        }, [history]);

        const focusInput = () => inputRef.current?.focus();
        useEffect(() => { focusInput(); }, []);

        // Listen to terminal triggers from sidebar clicks
        useEffect(() => {
          if (terminalTrigger && terminalTrigger.timestamp !== lastProcessedTriggerRef.current) {
            lastProcessedTriggerRef.current = terminalTrigger.timestamp;
            handleCommand(terminalTrigger.cmd);
          }
        }, [terminalTrigger]);

        const addLine = (text, type = 'output') => {
          setHistory(prev => [...prev, { id: Math.random().toString(), type, text }]);
        };

        const handleCommand = (cmdStr) => {
          const trimmed = cmdStr.trim();
          if (!trimmed) return;

          setCommandHistory(prev => {
            const updated = [...prev, trimmed];
            if (updated.length > 50) updated.shift();
            return updated;
          });
          setHistoryIndex(-1);

          const pathPrompt = currentWeek ? `/${currentWeek.name}` : '/';
          addLine(`guest@eeyel-dsa:${pathPrompt}$ ${trimmed}`, 'input');

          const args = trimmed.split(/\s+/);
          const command = args[0].toLowerCase();
          const parameter = args.slice(1).join(' ').replace(/['"]/g, '');

          switch (command) {
            case 'help':
              addLine('Available Commands:', 'success');
              addLine('  help             - Show this help manual');
              addLine('  weeks            - List all available laboratory weeks');
              addLine('  ls               - List files and questions in the current directory');
              addLine('  cd <week_name>   - Change directory (e.g., cd "Week 1", cd ..)');
              addLine('  cat <file_name>  - View file content (e.g., cat stack.c, cat README.md)');
              addLine('  fetch <file_name> - Fetches code and focus viewer');
              addLine('  info             - Show current repository integration statistics');
              addLine('  clear            - Clear terminal screen history');
              break;
            case 'clear':
              setHistory([]);
              break;
            case 'weeks':
              addLine('Available directories (Weeks):', 'success');
              weeks.forEach(w => {
                addLine(`  📁 ${w.name} (${w.questions.length} questions, ${w.files.length} source files)`);
              });
              break;
            case 'ls':
              if (!currentWeek) {
                addLine('Directory of / (root):', 'success');
                weeks.forEach(w => addLine(`  drwxr-xr-x   [DIR]   ${w.name}`));
                addLine(`  -rw-r--r--   [FILE]  README.md`);
              } else {
                addLine(`Directory of /${currentWeek.name}:`, 'success');
                addLine(`  drwxr-xr-x   [DIR]   ..`);
                addLine(`  -rw-r--r--   [FILE]  README.md (Lab Tasks)`);
                currentWeek.files.forEach(f => addLine(`  -rw-r--r--   [FILE]  ${f.name} (${(f.size / 1024).toFixed(2)} KB)`));
                if (currentWeek.questions.length > 0) {
                   addLine('\nLab Questions:', 'success');
                   currentWeek.questions.forEach((q, idx) => addLine(`  [Q${idx + 1}] ${q.text}`));
                }
              }
              break;
            case 'cd':
              if (!parameter || parameter === '/' || parameter === 'root') {
                onSelectWeek('');
                addLine('Returned to root directory /');
              } else if (parameter === '..') {
                if (currentWeek) {
                  onSelectWeek('');
                  addLine('Changed directory to /');
                } else {
                  addLine('Already at root directory /', 'error');
                }
              } else {
                const found = weeks.find(w => w.name.toLowerCase() === parameter.toLowerCase() || w.name.toLowerCase().replace(/\s+/g, '') === parameter.toLowerCase().replace(/\s+/g, ''));
                if (found) {
                  onSelectWeek(found.name);
                  addLine(`Changed directory to /${found.name}`);
                } else {
                  addLine(`cd: no such file or directory: ${parameter}`, 'error');
                }
              }
              break;
            case 'cat':
            case 'fetch':
              if (!parameter) {
                addLine(`${command}: missing file operand`, 'error');
                break;
              }
              if (parameter.toLowerCase() === 'readme.md') {
                if (currentWeek) {
                  if (currentWeek.readmeContent) {
                    addLine(`--- README.md for ${currentWeek.name} ---`, 'success');
                    currentWeek.readmeContent.split('\n').forEach(l => addLine(l));
                  } else {
                    addLine('README.md is empty or loading...', 'error');
                  }
                } else {
                  addLine('Root README.md is basic info. Change into a week (e.g. cd "Week 1") to read lab questions.', 'error');
                }
                break;
              }
              if (!currentWeek) {
                addLine(`cat: ${parameter}: No such file. Enter folder first (e.g. cd "Week 1")`, 'error');
              } else {
                const fileObj = currentWeek.files.find(f => f.name.toLowerCase() === parameter.toLowerCase());
                if (fileObj) {
                  addLine(`Fetching ${fileObj.name} from repository...`, 'success');
                  onSelectFile(currentWeek.name, fileObj.name);
                } else {
                  const qMatch = parameter.match(/^q(\d+)$/i);
                  if (qMatch) {
                    const qIdx = parseInt(qMatch[1], 10) - 1;
                    if (qIdx >= 0 && qIdx < currentWeek.questions.length) {
                      const question = currentWeek.questions[qIdx];
                      addLine(`Loading Question: ${question.text}`, 'success');
                      onSelectQuestion(currentWeek.name, question.id);
                    } else {
                      addLine(`Question index Q${qMatch[1]} out of bounds.`, 'error');
                    }
                  } else {
                    addLine(`cat: ${parameter}: No such file in this directory.`, 'error');
                  }
                }
              }
              break;
            case 'info':
              addLine('=== REPOSITORY INFORMATION ===', 'success');
              addLine(`  Target repository : ${repoName}`);
              addLine(`  Parsed Weeks      : ${weeks.length}`);
              addLine(`  Integrated GUI    : Yes (Active)`);
              addLine(`  Environment       : Standalone HTML Page Client`);
              break;
            default:
              addLine(`eeyel-cli: command not found: ${command}. Type "help" for instructions.`, 'error');
          }
        };

        const handleKeyDown = (e) => {
          if (e.key === 'Enter') {
            handleCommand(input);
            setInput('');
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (commandHistory.length === 0) return;
            const nextIdx = historyIndex === -1 ? commandHistory.length - 1 : Math.max(0, historyIndex - 1);
            setHistoryIndex(nextIdx);
            setInput(commandHistory[nextIdx]);
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex === -1) return;
            if (historyIndex === commandHistory.length - 1) {
              setHistoryIndex(-1);
              setInput('');
            } else {
              const nextIdx = historyIndex + 1;
              setHistoryIndex(nextIdx);
              setInput(commandHistory[nextIdx]);
            }
          }
        };

        return (
          <div
            onClick={isExpanded ? focusInput : () => setIsExpanded(true)}
            id="terminal-console"
            className={`bg-neutral-950 border border-neutral-900 rounded-lg p-3 md:p-4 font-mono text-xs text-neutral-200 transition-all duration-300 flex flex-col cursor-text relative select-text ${
              isExpanded ? 'min-h-[160px] max-h-[220px] overflow-y-auto' : 'min-h-[46px] max-h-[46px] overflow-hidden cursor-pointer hover:bg-neutral-900/40'
            }`}
          >
            {/* Terminal Title Bar */}
            <div className={`flex items-center justify-between sticky top-0 bg-neutral-950 z-10 select-none ${isExpanded ? 'border-b border-neutral-900/80 pb-2 mb-3' : ''}`}>
              <div className="flex items-center space-x-2">
                <Icon name="terminal" className="w-3.5 h-3.5 text-emerald-400" />
                <span className="text-neutral-300 text-xs font-bold">guest@eeyel-dsa: ~/cli_fetcher</span>
                {!isExpanded && (
                  <span className="text-[10px] text-neutral-500 font-bold ml-2 animate-pulse">[click to expand]</span>
                )}
              </div>
              <div className="flex items-center space-x-3">
                <span className="text-[10px] text-neutral-300 font-extrabold uppercase tracking-wider font-mono hidden sm:inline">CLI PANEL</span>
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    setIsExpanded(!isExpanded);
                  }}
                  className="flex items-center gap-1 text-[10px] font-bold text-neutral-300 hover:text-emerald-400 cursor-pointer bg-neutral-900 px-2 py-0.5 rounded border border-neutral-800 transition"
                >
                  {isExpanded ? (
                    <div className="flex items-center space-x-1">
                      <Icon name="chevronDown" className="w-3 h-3 text-neutral-400" />
                      <span>[collapse]</span>
                    </div>
                  ) : (
                    <div className="flex items-center space-x-1">
                      <Icon name="chevronUp" className="w-3 h-3 text-emerald-400" />
                      <span>[expand]</span>
                    </div>
                  )}
                </button>
              </div>
            </div>

            {/* Terminal Content wrapper - hidden when collapsed, but in DOM */}
            <div className={`flex-1 flex flex-col min-h-0 ${isExpanded ? '' : 'hidden'}`}>
              <div className="flex-1 flex flex-col space-y-1">
                {history.map(line => (
                  <div key={line.id} className="whitespace-pre-wrap leading-relaxed">
                    {line.type === 'input' && <span className="text-neutral-300 font-semibold">{line.text}</span>}
                    {line.type === 'output' && <span className="text-zinc-100">{line.text}</span>}
                    {line.type === 'error' && <span className="text-rose-400 font-extrabold">⚠️ {line.text}</span>}
                    {line.type === 'success' && <span className="text-emerald-400 font-bold">✓ {line.text}</span>}
                  </div>
                ))}
                <div ref={terminalEndRef} />
              </div>

              <div className="flex items-center space-x-2 mt-2 pt-2 border-t border-neutral-900/60 select-none">
                <span className="text-emerald-400 font-extrabold whitespace-nowrap">
                  guest@eeyel-dsa:{currentWeek ? `/${currentWeek.name}` : '/'}$
                </span>
                <input
                  ref={inputRef}
                  type="text"
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyDown={handleKeyDown}
                  className="flex-1 bg-transparent text-white border-none outline-none focus:ring-0 font-mono text-xs caret-emerald-400 min-w-[100px]"
                  placeholder='Type command here (e.g., "help", "ls")...'
                  autoComplete="off"
                  spellCheck="false"
                />
              </div>
            </div>
          </div>
        );
      }

      // App Main component
      function App() {
        const [repo, setRepo] = useState('soorzj/EEYEL-DSA');
        const [weeks, setWeeks] = useState([]);
        const [selectedWeek, setSelectedWeek] = useState(null);

        const [activeFileContent, setActiveFileContent] = useState(null);
        const [activeFileName, setActiveFileName] = useState(null);
        const [activeQuestion, setActiveQuestion] = useState(null);
        const [activeQuestionId, setActiveQuestionId] = useState(null);

        const [loadingRepo, setLoadingRepo] = useState(true);
        const [loadingFile, setLoadingFile] = useState(false);
        const [dataSource, setDataSource] = useState('API');
        const [showConfig, setShowConfig] = useState(false);
        const [customRepo, setCustomRepo] = useState('soorzj/EEYEL-DSA');

        const [terminalTrigger, setTerminalTrigger] = useState(null);

        const fetchRepositoryStructure = async (targetRepo, forceRefresh = false) => {
          setLoadingRepo(true);
          
          if (forceRefresh) {
            localStorage.removeItem(`cache_weeks_${targetRepo}`);
            localStorage.removeItem(`cache_source_${targetRepo}`);
            
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (key && key.startsWith(`cache_file_${targetRepo}_`)) {
                keysToRemove.push(key);
              }
            }
            keysToRemove.forEach(k => localStorage.removeItem(k));
            
            setSelectedWeek(null);
            setActiveFileContent(null);
            setActiveFileName(null);
            setActiveQuestion(null);
            setActiveQuestionId(null);
          }

          try {
            if (!forceRefresh) {
              const cachedWeeks = localStorage.getItem(`cache_weeks_${targetRepo}`);
              if (cachedWeeks) {
                setWeeks(JSON.parse(cachedWeeks));
                setDataSource('CACHE');
                setLoadingRepo(false);
                return;
              }
            }

            const rootRes = await fetch(`https://api.github.com/repos/${targetRepo}/contents`);
            if (!rootRes.ok) throw new Error(`Status: ${rootRes.status}`);

            const rootData = await rootRes.json();
            const weekDirs = rootData.filter(item => item.type === 'dir' && item.name.toLowerCase().startsWith('week'));

            if (weekDirs.length === 0) {
              const alternativeDirs = rootData.filter(item => item.type === 'dir');
              if (alternativeDirs.length > 0) weekDirs.push(...alternativeDirs);
            }

            const weeksPayload = await Promise.all(
              weekDirs.map(async (dir) => {
                try {
                  const dirRes = await fetch(`https://api.github.com/repos/${targetRepo}/contents/${encodeURIComponent(dir.name)}`);
                  if (!dirRes.ok) return { name: dir.name, path: dir.path, questions: [], files: [], readmeContent: null };

                  const dirContents = await dirRes.json();
                  const cFiles = dirContents.filter(item => item.type === 'file' && item.name.toLowerCase().endsWith('.c'));
                  const readmeFile = dirContents.find(item => item.type === 'file' && item.name.toLowerCase() === 'readme.md');

                  let readmeContent = null;
                  let questions = [];

                  if (readmeFile && readmeFile.download_url) {
                    const readmeRes = await fetch(readmeFile.download_url);
                    if (readmeRes.ok) {
                      readmeContent = await readmeRes.text();
                      questions = parseQuestions(readmeContent, dir.name);
                    }
                  }

                  return { name: dir.name, path: dir.path, questions, files: cFiles, readmeContent };
                } catch (e) {
                  return { name: dir.name, path: dir.path, questions: [], files: [], readmeContent: null };
                }
              })
            );

            const sortedWeeks = [...weeksPayload].sort((a, b) => {
              const numA = parseInt(a.name.replace(/\D/g, ''), 10) || 0;
              const numB = parseInt(b.name.replace(/\D/g, ''), 10) || 0;
              return numA - numB;
            });

            setWeeks(sortedWeeks);
            setDataSource('API');
            localStorage.setItem(`cache_weeks_${targetRepo}`, JSON.stringify(sortedWeeks));
          } catch (err) {
            console.warn('API Error, loading offline fallback:', err);
            if (targetRepo === 'soorzj/EEYEL-DSA') {
              setWeeks(FALLBACK_WEEKS);
              setDataSource('OFFLINE');
            } else {
              setWeeks([]);
              setDataSource('OFFLINE');
            }
          } finally {
            setLoadingRepo(false);
          }
        };

        useEffect(() => { fetchRepositoryStructure(repo, true); }, [repo]);

        const handleSelectWeek = (weekName) => {
          const found = weeks.find(w => w.name === weekName);
          setSelectedWeek(found || null);
        };

        const handleSelectFile = async (weekName, fileName) => {
          setLoadingFile(true);
          setActiveFileName(fileName);
          setActiveQuestion(null);
          setActiveQuestionId(null);

          const currentWeekData = weeks.find(w => w.name === weekName);
          if (currentWeekData) {
            setSelectedWeek(currentWeekData);

            if (fileName.toLowerCase() === 'readme.md') {
              setActiveFileContent(currentWeekData.readmeContent);
              setLoadingFile(false);
              setTerminalTrigger({ cmd: `cat README.md`, timestamp: Date.now() });
              return;
            }

            const cacheKey = `cache_file_${repo}_${weekName}_${fileName}`;
            const cachedContent = localStorage.getItem(cacheKey);
            if (cachedContent) {
              setActiveFileContent(cachedContent);
              setLoadingFile(false);
              setTerminalTrigger({ cmd: `cat ${fileName}`, timestamp: Date.now() });
              return;
            }

            const fileMeta = currentWeekData.files.find(f => f.name === fileName);
            if (fileMeta && fileMeta.download_url) {
              try {
                const res = await fetch(fileMeta.download_url);
                if (res.ok) {
                  const rawText = await res.text();
                  setActiveFileContent(rawText);
                  localStorage.setItem(cacheKey, rawText);
                } else {
                  throw new Error('Raw fetch failed');
                }
              } catch (e) {
                const fallbackPath = `${weekName}/${fileName}`;
                if (FALLBACK_FILES[fallbackPath]) {
                  setActiveFileContent(FALLBACK_FILES[fallbackPath]);
                } else {
                  setActiveFileContent('// Error loading file contents.');
                }
              }
            } else {
              const fallbackPath = `${weekName}/${fileName}`;
              if (FALLBACK_FILES[fallbackPath]) {
                setActiveFileContent(FALLBACK_FILES[fallbackPath]);
              } else {
                setActiveFileContent('// File not found.');
              }
            }
          }
          setLoadingFile(false);
          setTerminalTrigger({ cmd: `cat ${fileName}`, timestamp: Date.now() });
        };

        const handleSelectQuestion = (weekName, questionId) => {
          const currentWeekData = weeks.find(w => w.name === weekName);
          if (!currentWeekData) return;

          const question = currentWeekData.questions.find(q => q.id === questionId);
          if (!question) return;

          setSelectedWeek(currentWeekData);
          setActiveQuestion(question);
          setActiveQuestionId(questionId);

          const qIndex = currentWeekData.questions.findIndex(q => q.id === questionId) + 1;
          setTerminalTrigger({ cmd: `cat q${qIndex}`, timestamp: Date.now() });

          if (question.associatedFile) {
            handleSelectFile(weekName, question.associatedFile);
            setActiveQuestion(question);
            setActiveQuestionId(questionId);
          } else {
            setActiveFileName(null);
            setActiveFileContent(null);
          }
        };

        const handleRepositoryChange = (e) => {
          e.preventDefault();
          if (customRepo.trim()) {
            setRepo(customRepo.trim());
            setShowConfig(false);
            setSelectedWeek(null);
            setActiveFileContent(null);
            setActiveFileName(null);
            setActiveQuestion(null);
            setActiveQuestionId(null);
          }
        };

        return (
          <div className="h-screen w-full bg-[#0a0a0a] text-neutral-200 font-mono flex flex-col overflow-hidden select-none relative">
            <header className="h-12 border-b border-neutral-800 bg-[#111] flex items-center justify-between px-3 md:px-4 shrink-0">
              <div className="flex items-center gap-2 md:gap-3">
                <div className="hidden sm:flex gap-1.5">
                  <div className="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/40"></div>
                  <div className="w-3 h-3 rounded-full bg-amber-500/20 border border-amber-500/40"></div>
                  <div className="w-3 h-3 rounded-full bg-emerald-500/20 border border-emerald-500/40"></div>
                </div>
                <div className="hidden sm:block h-4 w-[1px] bg-neutral-800 mx-2"></div>
                <span className="text-xs text-white font-mono font-black tracking-wider uppercase hidden md:inline">eeyel-dsa-cli — explorer</span>
                <span className="text-xs text-white font-mono font-black tracking-wider uppercase md:hidden">eeyel-dsa</span>
                <button onClick={() => setShowConfig(!showConfig)} className="text-[11px] text-neutral-300 hover:text-emerald-400 font-mono font-bold transition-colors ml-1 md:ml-4 flex items-center gap-1 cursor-pointer bg-neutral-800/60 px-2 py-0.5 rounded border border-neutral-700">
                  <Icon name="sliders" className="w-3 h-3" />
                  <span className="hidden xs:inline">[config]</span>
                </button>
              </div>
              <div className="flex items-center gap-3 md:gap-6 text-[11px] font-bold tracking-wider text-neutral-200 uppercase font-mono">
                <span className="hover:text-emerald-400 cursor-pointer transition-colors bg-neutral-800/40 border border-neutral-700/60 px-2 py-1 rounded max-w-[130px] sm:max-w-none truncate" onClick={() => setShowConfig(!showConfig)}>
                  Repo: <span className="text-white font-black">{repo}</span>
                </span>
                <button onClick={() => fetchRepositoryStructure(repo, true)} disabled={loadingRepo} className="text-[11px] text-white hover:text-emerald-400 font-extrabold transition-colors flex items-center gap-1 cursor-pointer disabled:opacity-50 bg-neutral-800/60 border border-neutral-700 px-2 py-1 rounded">
                  <Icon name="refreshCw" className={`w-3.5 h-3.5 ${loadingRepo ? 'animate-spin' : ''}`} />
                  <span className="hidden sm:inline">[sync]</span>
                </button>
                <div className="hidden sm:flex bg-emerald-950/40 border border-emerald-500/30 h-6 px-3 items-center rounded text-emerald-400 font-extrabold text-[10px]">
                  {dataSource}
                </div>
              </div>
            </header>

            {showConfig && (
              <div className="bg-[#111] border-b border-neutral-800 overflow-hidden shrink-0">
                <div className="max-w-3xl mx-auto px-4 py-5 text-left">
                  <form onSubmit={handleRepositoryChange} className="flex flex-col md:flex-row items-end gap-3.5">
                    <div className="flex-1">
                      <label className="text-xs font-semibold text-emerald-400 uppercase tracking-wider block mb-1.5 font-sans">
                        Integrate Your Github Repository
                      </label>
                      <p className="text-xs text-zinc-300 mb-3 font-sans">
                        Change the input below to render laboratory files from any custom GitHub repository that conforms to the Week structure.
                      </p>
                      <div className="relative">
                        <span className="absolute left-3 top-2.5 text-xs text-zinc-400 font-mono">https://github.com/</span>
                        <input
                          type="text"
                          value={customRepo}
                          onChange={(e) => setCustomRepo(e.target.value)}
                          placeholder="username/repository"
                          className="w-full bg-neutral-950 border border-neutral-850 rounded px-3 py-2 pl-[160px] text-xs font-mono text-white focus:outline-none focus:border-indigo-500"
                        />
                      </div>
                    </div>
                    <button type="submit" className="w-full md:w-auto bg-emerald-600 hover:bg-emerald-500 text-black font-semibold text-xs py-2 px-4 rounded transition h-[34px] flex items-center justify-center space-x-1 cursor-pointer">
                      <Icon name="check" className="w-3.5 h-3.5" />
                      <span>Update Target</span>
                    </button>
                  </form>
                </div>
              </div>
            )}

            <div className="flex flex-col md:flex-row flex-1 overflow-hidden">
              <aside className="w-full h-48 sm:h-56 md:h-auto md:w-80 border-b md:border-b-0 md:border-r border-neutral-800 bg-[#0d0d0d] flex flex-col shrink-0 overflow-y-auto">
                <FileTree
                  weeks={weeks}
                  selectedWeek={selectedWeek}
                  onSelectWeek={handleSelectWeek}
                  onSelectFile={handleSelectFile}
                  onSelectQuestion={handleSelectQuestion}
                  activeFileName={activeFileName}
                  activeQuestionId={activeQuestionId}
                  loading={loadingRepo}
                />
              </aside>

              <main className="flex-1 bg-[#050505] flex flex-col overflow-hidden">
                <div className="flex-1 overflow-hidden min-h-0 flex flex-col">
                  <CodeViewer
                    code={activeFileContent}
                    fileName={activeFileName}
                    question={activeQuestion}
                    loading={loadingFile}
                    repoUrl={`https://github.com/${repo}`}
                    weekName={selectedWeek?.name || null}
                  />
                </div>

                <div className="border-t border-neutral-800/80 bg-neutral-950 p-3 shrink-0">
                  <TerminalConsole
                    weeks={weeks}
                    currentWeek={selectedWeek}
                    onSelectWeek={handleSelectWeek}
                    onSelectFile={handleSelectFile}
                    onSelectQuestion={handleSelectQuestion}
                    repoName={repo}
                    terminalTrigger={terminalTrigger}
                  />
                </div>
              </main>
            </div>

            <footer className="h-8 bg-emerald-500/90 text-black flex items-center px-4 justify-between text-[11px] font-bold shrink-0">
              <div className="flex gap-2 sm:gap-4 truncate">
                <span className="hidden sm:inline">● Connected to GitHub API</span>
                <span className="truncate">● Repo: {repo}</span>
              </div>
              <div className="flex gap-2 sm:gap-4 shrink-0">
                <span>-- NORMAL --</span>
                <span className="hidden md:inline">EEYEL-DSA MASTER CLI</span>
              </div>
            </footer>
          </div>
        );
      }

      // Initial Mount
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>

    <!-- Vite HMR Entry Connection (silently discarded if index.html is loaded directly offline) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
